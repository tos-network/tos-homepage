<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nftGradient" x1="4" y1="4" x2="44" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="50%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>
  <!-- NFT Frame -->
  <rect x="8" y="6" width="32" height="36" rx="3" stroke="url(#nftGradient)" stroke-width="2" fill="none"/>
  <!-- Inner frame -->
  <rect x="12" y="10" width="24" height="24" rx="2" stroke="url(#nftGradient)" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- Diamond/Gem shape -->
  <path d="M24 14L32 22L24 32L16 22L24 14Z" stroke="url(#nftGradient)" stroke-width="2" fill="none"/>
  <path d="M18 22L24 14L30 22" stroke="url(#nftGradient)" stroke-width="1.5" opacity="0.6"/>
  <path d="M24 22L24 32" stroke="url(#nftGradient)" stroke-width="1.5" opacity="0.6"/>
  <path d="M18 22L24 22L30 22" stroke="url(#nftGradient)" stroke-width="1.5" opacity="0.6"/>
  <!-- Shine effect -->
  <circle cx="20" cy="18" r="1" fill="url(#nftGradient)" opacity="0.8"/>
  <!-- ID badge -->
  <rect x="14" y="36" width="20" height="4" rx="1" stroke="url(#nftGradient)" stroke-width="1" fill="none" opacity="0.7"/>
  <line x1="16" y1="38" x2="22" y2="38" stroke="url(#nftGradient)" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <!-- Batch indicator -->
  <rect x="36" y="4" width="8" height="8" rx="2" stroke="url(#nftGradient)" stroke-width="1.5" fill="none" opacity="0.8"/>
  <text x="38" y="10" font-family="Inter, sans-serif" font-size="6" font-weight="bold" fill="url(#nftGradient)">+</text>
  <!-- Sparkle -->
  <path d="M6 12L8 14L6 16L4 14Z" fill="url(#nftGradient)" opacity="0.6"/>
</svg>
