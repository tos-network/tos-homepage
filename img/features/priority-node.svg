<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nodeGradient" x1="4" y1="4" x2="44" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <!-- Central priority node (larger, with shield) -->
  <circle cx="24" cy="24" r="10" stroke="url(#nodeGradient)" stroke-width="2" fill="none"/>
  <path d="M24 18L28 20V23C28 26 26 28 24 29C22 28 20 26 20 23V20L24 18Z" stroke="url(#nodeGradient)" stroke-width="1.5" fill="none"/>
  <path d="M22 23L24 25L27 21" stroke="url(#nodeGradient)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Trusted node 1 (top) -->
  <circle cx="24" cy="6" r="4" stroke="url(#nodeGradient)" stroke-width="1.5" fill="none"/>
  <circle cx="24" cy="6" r="1.5" fill="url(#nodeGradient)"/>
  <line x1="24" y1="10" x2="24" y2="14" stroke="url(#nodeGradient)" stroke-width="1.5" stroke-dasharray="2 1"/>
  <!-- Trusted node 2 (bottom-left) -->
  <circle cx="8" cy="38" r="4" stroke="url(#nodeGradient)" stroke-width="1.5" fill="none"/>
  <circle cx="8" cy="38" r="1.5" fill="url(#nodeGradient)"/>
  <line x1="11" y1="35" x2="17" y2="29" stroke="url(#nodeGradient)" stroke-width="1.5" stroke-dasharray="2 1"/>
  <!-- Trusted node 3 (bottom-right) -->
  <circle cx="40" cy="38" r="4" stroke="url(#nodeGradient)" stroke-width="1.5" fill="none"/>
  <circle cx="40" cy="38" r="1.5" fill="url(#nodeGradient)"/>
  <line x1="37" y1="35" x2="31" y2="29" stroke="url(#nodeGradient)" stroke-width="1.5" stroke-dasharray="2 1"/>
  <!-- Untrusted node (crossed out, top-right) -->
  <circle cx="42" cy="12" r="3" stroke="url(#nodeGradient)" stroke-width="1" fill="none" opacity="0.4"/>
  <line x1="40" y1="10" x2="44" y2="14" stroke="url(#nodeGradient)" stroke-width="1" opacity="0.4"/>
  <line x1="44" y1="10" x2="40" y2="14" stroke="url(#nodeGradient)" stroke-width="1" opacity="0.4"/>
  <!-- Untrusted node (crossed out, left) -->
  <circle cx="6" cy="18" r="3" stroke="url(#nodeGradient)" stroke-width="1" fill="none" opacity="0.4"/>
  <line x1="4" y1="16" x2="8" y2="20" stroke="url(#nodeGradient)" stroke-width="1" opacity="0.4"/>
  <line x1="8" y1="16" x2="4" y2="20" stroke="url(#nodeGradient)" stroke-width="1" opacity="0.4"/>
  <!-- Priority indicator -->
  <text x="20" y="46" font-family="Inter, sans-serif" font-size="5" font-weight="bold" fill="url(#nodeGradient)" opacity="0.8">P1</text>
</svg>
