  <path d="M4 36L8 34L4 32" stroke="url(#unoAccent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  <path d="M8 34L14 34" stroke="url(#unoAccent)" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M44 36L40 34L44 32" stroke="url(#unoAccent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  <path d="M40 34L34 34" stroke="url(#unoAccent)" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
