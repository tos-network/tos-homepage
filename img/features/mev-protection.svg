  <path d="M6 18L4 20L6 22" stroke="url(#mevGradient)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  <path d="M44 20L38 24" stroke="url(#mevGradient)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M42 18L44 20L42 22" stroke="url(#mevGradient)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  <!-- X marks for blocked -->
